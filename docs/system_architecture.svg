<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="860" viewBox="0 0 1360 860" role="img" aria-labelledby="title desc">
  <title id="title">SonicWave System Architecture</title>
  <desc id="desc">Android App through BLE to ESP32 firmware with buses, state machine, wave and laser modules, and hardware paths.</desc>

  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 600 18px Arial, sans-serif; fill: #1f2937; }
      .label { font: 600 15px Arial, sans-serif; fill: #111827; }
      .small { font: 500 13px Arial, sans-serif; fill: #374151; }
      .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 10; ry: 10; }
      .gate { fill: #ecfeff; stroke: #0f766e; stroke-width: 2.5; rx: 10; ry: 10; }
      .bus { fill: #eef2ff; stroke: #3730a3; stroke-width: 2; rx: 10; ry: 10; }
      .hw { fill: #fff7ed; stroke: #9a3412; stroke-width: 2; rx: 10; ry: 10; }
      .app { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; rx: 10; ry: 10; }
      .arrow { stroke: #111827; stroke-width: 2.4; fill: none; marker-end: url(#m); }
      .arrow2 { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#m2); }
      .dash { stroke-dasharray: 7 7; }
    </style>
    <marker id="m" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <polygon points="0,0 11,5.5 0,11" fill="#111827"/>
    </marker>
    <marker id="m2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#374151"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1360" height="860" fill="#ffffff"/>
  <text x="36" y="48" class="title">SonicWave Firmware Architecture</text>
  <text x="36" y="76" class="small">Android App -> BLE -> ESP32 Firmware with Safety Gate, Command/Event Buses, and Wave/Laser paths</text>

  <rect x="60" y="120" width="220" height="88" class="app"/>
  <text x="170" y="156" text-anchor="middle" class="label">Android App</text>
  <text x="170" y="180" text-anchor="middle" class="small">Control + UI</text>

  <rect x="350" y="120" width="260" height="88" class="box"/>
  <text x="480" y="156" text-anchor="middle" class="label">BleTransport</text>
  <text x="480" y="180" text-anchor="middle" class="small">GATT RX/TX (BLE)</text>

  <rect x="680" y="120" width="260" height="88" class="box"/>
  <text x="810" y="156" text-anchor="middle" class="label">ProtocolCodec</text>
  <text x="810" y="180" text-anchor="middle" class="small">parse / encode</text>

  <rect x="360" y="270" width="240" height="84" class="bus"/>
  <text x="480" y="304" text-anchor="middle" class="label">CommandBus</text>
  <text x="480" y="328" text-anchor="middle" class="small">Command dispatch</text>

  <rect x="680" y="270" width="240" height="84" class="bus"/>
  <text x="800" y="304" text-anchor="middle" class="label">EventBus</text>
  <text x="800" y="328" text-anchor="middle" class="small">Event publish</text>

  <rect x="500" y="410" width="300" height="96" class="gate"/>
  <text x="650" y="447" text-anchor="middle" class="label">SystemStateMachine</text>
  <text x="650" y="471" text-anchor="middle" class="small">Safety Gate</text>
  <text x="650" y="492" text-anchor="middle" class="small">IDLE / ARMED / RUNNING / FAULT_STOP</text>

  <rect x="300" y="570" width="280" height="96" class="box"/>
  <text x="440" y="606" text-anchor="middle" class="label">WaveModule</text>
  <text x="440" y="630" text-anchor="middle" class="small">I2S_Audio Task + DDS</text>

  <rect x="740" y="570" width="280" height="96" class="box"/>
  <text x="880" y="606" text-anchor="middle" class="label">LaserModule</text>
  <text x="880" y="630" text-anchor="middle" class="small">LaserTask + Modbus read</text>

  <rect x="120" y="740" width="620" height="82" class="hw"/>
  <text x="430" y="772" text-anchor="middle" class="label">I2S -> PCM5102A -> TPA3255 -> Vibrating Platform</text>
  <text x="430" y="798" text-anchor="middle" class="small">Wave output hardware chain</text>

  <rect x="820" y="740" width="420" height="82" class="hw"/>
  <text x="1030" y="772" text-anchor="middle" class="label">UART/Modbus -> Laser Sensor</text>
  <text x="1030" y="798" text-anchor="middle" class="small">Distance sampling path</text>

  <path d="M280 164 L350 164" class="arrow"/>
  <text x="314" y="148" class="small">BLE</text>

  <path d="M610 164 L680 164" class="arrow"/>
  <path d="M480 208 L480 270" class="arrow"/>
  <path d="M810 208 L810 270" class="arrow"/>

  <path d="M600 312 L680 312" class="arrow"/>
  <path d="M650 354 L650 410" class="arrow"/>

  <path d="M590 506 L500 570" class="arrow"/>
  <path d="M710 506 L800 570" class="arrow"/>

  <path d="M440 666 L430 740" class="arrow"/>
  <path d="M880 666 L1030 740" class="arrow"/>

  <path d="M880 570 L880 354" class="arrow2 dash"/>
  <path d="M800 312 L610 312" class="arrow2 dash"/>
  <text x="660" y="292" class="small">fault/state/measurement events</text>

  <text x="1010" y="120" class="subtitle">Safety First</text>
  <text x="1010" y="146" class="small">All vibration output must pass</text>
  <text x="1010" y="168" class="small">through SystemStateMachine.</text>
</svg>
