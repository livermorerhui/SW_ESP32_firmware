<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="980" viewBox="0 0 1680 980" role="img" aria-labelledby="title desc">
  <title id="title">SonicWave System Master Architecture</title>
  <desc id="desc">Android apps, ESP32 firmware, and hardware with control/data/safety planes based on repository implementation.</desc>
  <defs>
    <style>
      .bg { fill:#f7f9fc; }
      .card { fill:#ffffff; stroke:#243447; stroke-width:2; rx:14; ry:14; }
      .title { font: 700 24px 'Segoe UI', Arial, sans-serif; fill:#0f172a; }
      .h2 { font: 700 18px 'Segoe UI', Arial, sans-serif; fill:#0f172a; }
      .txt { font: 14px 'Segoe UI', Arial, sans-serif; fill:#1f2937; }
      .mono { font: 13px 'Courier New', monospace; fill:#111827; }
      .small { font: 12px 'Segoe UI', Arial, sans-serif; fill:#374151; }
      .planeControl { stroke:#0b7285; stroke-width:3; fill:none; marker-end:url(#arrowControl); }
      .planeData { stroke:#e67700; stroke-width:3; fill:none; marker-end:url(#arrowData); }
      .planeSafety { stroke:#c92a2a; stroke-width:3; fill:none; marker-end:url(#arrowSafety); }
      .dashed { stroke-dasharray:8 6; }
      .note { fill:#fff7ed; stroke:#fdba74; stroke-width:1.5; rx:10; ry:10; }
      .legend { fill:#eef2ff; stroke:#c7d2fe; stroke-width:1.5; rx:10; ry:10; }
    </style>
    <marker id="arrowControl" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#0b7285"/>
    </marker>
    <marker id="arrowData" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#e67700"/>
    </marker>
    <marker id="arrowSafety" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#c92a2a"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1680" height="980"/>
  <text class="title" x="40" y="44">SonicWave System Master (from src/ + docs/)</text>

  <rect class="card" x="40" y="90" width="420" height="350"/>
  <text class="h2" x="60" y="125">Android SW APP (最终产品)</text>
  <text class="txt" x="60" y="152">定位：产品端 UI / 业务流程（docs/system_overview.md）</text>
  <text class="mono" x="60" y="188">Control: CAP?, WAVE:SET/START/STOP, SCALE:ZERO/CAL</text>
  <text class="mono" x="60" y="214">Events: EVT:STATE, EVT:FAULT, EVT:STABLE, EVT:PARAM, EVT:STREAM</text>
  <text class="txt" x="60" y="246">通过 BLE UART Service 与 ESP32 交互</text>

  <rect class="card" x="40" y="470" width="420" height="300"/>
  <text class="h2" x="60" y="505">Android Demo (联调工具)</text>
  <text class="txt" x="60" y="532">代码：tools/android_demo/</text>
  <text class="txt" x="60" y="558">Compose + ViewModel + sonicwave-sdk</text>
  <text class="txt" x="60" y="584">能力探测：CAP? 超时后切 legacy 模式</text>
  <text class="txt" x="60" y="610">可迁移模块来源：protocol/sdk/transport</text>

  <rect class="card" x="540" y="90" width="560" height="680"/>
  <text class="h2" x="560" y="125">ESP32 Firmware (src/)</text>
  <text class="txt" x="560" y="152">BleTransport + ProtocolCodec + CommandBus + EventBus</text>
  <text class="txt" x="560" y="178">SystemStateMachine + WaveModule + LaserModule</text>

  <rect x="560" y="210" width="520" height="110" class="note"/>
  <text class="h2" x="580" y="244" fill="#9a3412">Safety Ownership</text>
  <text class="txt" x="580" y="270" fill="#7c2d12">SystemStateMachine 是唯一启停闸门（setState -&gt; start/stopSoft）</text>
  <text class="txt" x="580" y="294" fill="#7c2d12">断连/离位/传感器异常/疑似跌倒会触发 FAULT_STOP</text>

  <rect class="card" x="560" y="350" width="240" height="120"/>
  <text class="h2" x="575" y="382">Control Plane</text>
  <text class="mono" x="575" y="408">BLE RX -&gt; parse -&gt; dispatch</text>
  <text class="mono" x="575" y="432">-&gt; FSM/Wave/Laser</text>

  <rect class="card" x="840" y="350" width="240" height="120"/>
  <text class="h2" x="855" y="382">Safety Flow</text>
  <text class="mono" x="855" y="408">Laser/Disconnect -&gt; FSM</text>
  <text class="mono" x="855" y="432">FSM -&gt; stopSoft + EVT</text>

  <rect class="card" x="560" y="500" width="520" height="250"/>
  <text class="h2" x="580" y="534">Key Protocol Surface</text>
  <text class="mono" x="580" y="562">Commands: CAP?, WAVE:SET, WAVE:START, WAVE:STOP, SCALE:ZERO, SCALE:CAL</text>
  <text class="mono" x="580" y="588">ACK/NACK: ACK:CAP fw=... proto=..., ACK:OK, NACK:INVALID_PARAM/NOT_ARMED/FAULT_LOCKED</text>
  <text class="mono" x="580" y="614">Events: EVT:STATE, EVT:FAULT, EVT:STABLE, EVT:PARAM, EVT:STREAM</text>
  <text class="small" x="580" y="640">注：DEBUG_STREAM=true 时会持续上报 EVT:STREAM（src/config/GlobalConfig.h）</text>

  <rect class="card" x="1160" y="90" width="470" height="680"/>
  <text class="h2" x="1180" y="125">Hardware</text>

  <rect class="card" x="1180" y="160" width="430" height="95"/>
  <text class="h2" x="1200" y="194">Laser Sensor (Modbus UART)</text>
  <text class="txt" x="1200" y="220">Serial1 RX=15 TX=14, slave=1, reg=0x0064</text>

  <rect class="card" x="1180" y="280" width="430" height="95"/>
  <text class="h2" x="1200" y="314">PCM5102A DAC (I2S)</text>
  <text class="txt" x="1200" y="340">BCLK=4, LRCK=5, DOUT=6</text>

  <rect class="card" x="1180" y="400" width="430" height="95"/>
  <text class="h2" x="1200" y="434">TPA3255 Amplifier</text>
  <text class="txt" x="1200" y="460">DAC 模拟输出功率放大</text>

  <rect class="card" x="1180" y="520" width="430" height="95"/>
  <text class="h2" x="1200" y="554">Platform / Actuator</text>
  <text class="txt" x="1200" y="580">最终机械振动输出端</text>

  <rect class="legend" x="1160" y="790" width="470" height="150"/>
  <text class="h2" x="1180" y="824">Plane Legend</text>
  <line class="planeControl" x1="1180" y1="850" x2="1260" y2="850"/>
  <text class="txt" x="1270" y="855">Control Plane</text>
  <line class="planeData" x1="1180" y1="880" x2="1260" y2="880"/>
  <text class="txt" x="1270" y="885">Data Plane</text>
  <line class="planeSafety" x1="1180" y1="910" x2="1260" y2="910"/>
  <text class="txt" x="1270" y="915">Safety Flow</text>

  <path class="planeControl" d="M460 220 C 505 220, 510 220, 540 220"/>
  <path class="planeControl" d="M460 560 C 505 560, 505 450, 560 450"/>

  <path class="planeData" d="M1080 410 C 1120 410, 1140 330, 1180 330"/>
  <path class="planeData" d="M1610 330 C 1630 330, 1630 450, 1610 450"/>
  <path class="planeData" d="M1610 450 C 1630 450, 1630 570, 1610 570"/>

  <path class="planeSafety" d="M1180 205 C 1120 205, 1120 410, 1080 410"/>
  <path class="planeSafety" d="M1080 410 C 1120 410, 1120 260, 1060 260"/>
  <path class="planeSafety" d="M1060 260 C 990 260, 980 260, 930 260"/>

  <path class="planeControl dashed" d="M1080 590 C 1120 590, 1140 210, 1180 210"/>
  <text class="small" x="1090" y="610">SCALE:ZERO/CAL -&gt; Laser params</text>
</svg>
