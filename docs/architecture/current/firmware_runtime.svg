<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="980" viewBox="0 0 1680 980" role="img" aria-labelledby="title desc">
  <title id="title">SonicWave Firmware Runtime Architecture</title>
  <desc id="desc">Runtime tasks, modules, buses, and safety/data plane separation based on src implementation.</desc>
  <defs>
    <style>
      .bg { fill:#f8fafc; }
      .card { fill:#ffffff; stroke:#1f2937; stroke-width:2; rx:12; ry:12; }
      .title { font:700 24px 'Segoe UI', Arial, sans-serif; fill:#0f172a; }
      .h2 { font:700 18px 'Segoe UI', Arial, sans-serif; fill:#0f172a; }
      .txt { font:14px 'Segoe UI', Arial, sans-serif; fill:#1f2937; }
      .mono { font:13px 'Courier New', monospace; fill:#111827; }
      .small { font:12px 'Segoe UI', Arial, sans-serif; fill:#374151; }
      .ctrl { stroke:#0b7285; stroke-width:3; fill:none; marker-end:url(#arrowCtrl); }
      .evt { stroke:#2563eb; stroke-width:3; fill:none; marker-end:url(#arrowEvt); }
      .data { stroke:#d97706; stroke-width:3; fill:none; marker-end:url(#arrowData); }
      .safe { stroke:#c92a2a; stroke-width:3; fill:none; marker-end:url(#arrowSafe); }
      .gate { fill:#fff7ed; stroke:#fb923c; stroke-width:2; rx:12; ry:12; }
      .warning { fill:#fef2f2; stroke:#f87171; stroke-width:2; rx:12; ry:12; }
      .legend { fill:#eef2ff; stroke:#c7d2fe; stroke-width:1.5; rx:10; ry:10; }
      .dashed { stroke-dasharray:8 6; }
    </style>
    <marker id="arrowCtrl" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#0b7285"/>
    </marker>
    <marker id="arrowEvt" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#2563eb"/>
    </marker>
    <marker id="arrowData" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#d97706"/>
    </marker>
    <marker id="arrowSafe" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#c92a2a"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1680" height="980"/>
  <text class="title" x="40" y="44">Firmware Runtime (ESP32-S3 / src/)</text>

  <rect class="card" x="40" y="90" width="360" height="260"/>
  <text class="h2" x="60" y="124">main loop</text>
  <text class="mono" x="60" y="152">setup(): bus -&gt; FSM -&gt; modules -&gt; BLE</text>
  <text class="mono" x="60" y="178">loop(): delay(20)</text>
  <text class="txt" x="60" y="206">保持轻量，实时工作在任务与 BLE 回调中</text>

  <rect class="card" x="40" y="380" width="360" height="220"/>
  <text class="h2" x="60" y="414">BLE callbacks</text>
  <text class="mono" x="60" y="442">onWrite / onConnect / onDisconnect</text>
  <text class="mono" x="60" y="468">core: BLE stack scheduling (not pinned)</text>
  <text class="txt" x="60" y="496">断连时触发 BleDisconnectSink::onBleDisconnect</text>

  <rect class="card" x="40" y="630" width="360" height="280"/>
  <text class="h2" x="60" y="664">FreeRTOS workers</text>
  <text class="mono" x="60" y="692">audioTask: I2S_Audio, prio=4, core=1</text>
  <text class="mono" x="60" y="718">laserTask: LaserTask, prio=2, core=1</text>
  <text class="txt" x="60" y="746">audioTask: DDS + i2s_write(DMA)</text>
  <text class="txt" x="60" y="772">laserTask: Modbus sample + safety trigger</text>

  <rect class="card" x="500" y="90" width="1130" height="820"/>
  <text class="h2" x="520" y="124">Runtime Modules</text>

  <rect class="card" x="520" y="160" width="250" height="110"/>
  <text class="h2" x="540" y="194">BleTransport</text>
  <text class="mono" x="540" y="220">RX parse + TX notify</text>
  <text class="mono" x="540" y="244">EventSink</text>

  <rect class="card" x="820" y="160" width="250" height="110"/>
  <text class="h2" x="840" y="194">ProtocolCodec</text>
  <text class="mono" x="840" y="220">parseCommand</text>
  <text class="mono" x="840" y="244">encodeEvent</text>

  <rect class="card" x="1120" y="160" width="230" height="110"/>
  <text class="h2" x="1140" y="194">CommandBus</text>
  <text class="mono" x="1140" y="220">dispatch(cmd)</text>

  <rect class="card" x="1380" y="160" width="230" height="110"/>
  <text class="h2" x="1400" y="194">EventBus</text>
  <text class="mono" x="1400" y="220">publish(evt)</text>

  <rect class="gate" x="700" y="320" width="710" height="150"/>
  <text class="h2" x="720" y="356" fill="#9a3412">SystemStateMachine (Safety Gate, one-vote veto)</text>
  <text class="mono" x="720" y="384">States: IDLE / ARMED / RUNNING / FAULT_STOP</text>
  <text class="mono" x="720" y="410">requestStart/requestStop + onUserOff/onSensorErr/onFallSuspected</text>
  <text class="mono" x="720" y="436">setState() is the ONLY gate to WaveModule.start()/stopSoft()</text>

  <rect class="card" x="700" y="520" width="340" height="220"/>
  <text class="h2" x="720" y="554">WaveModule</text>
  <text class="txt" x="720" y="580">I2S init + DDS synthesis + smooth ramp</text>
  <text class="mono" x="720" y="606">audioTask -&gt; i2s_write(DMA)</text>
  <text class="txt" x="720" y="632">start()/stopSoft() 仅由 FSM 触发</text>

  <rect class="card" x="1090" y="520" width="520" height="220"/>
  <text class="h2" x="1110" y="554">LaserModule</text>
  <text class="txt" x="1110" y="580">Modbus read distance -&gt; weight / stable / stream</text>
  <text class="mono" x="1110" y="606">safety inputs -&gt; FSM: onUserOn/off, onSensorErr, onFallSuspected</text>
  <text class="mono" x="1110" y="632">events -&gt; EventBus: PARAMS, STABLE_WEIGHT, STREAM</text>

  <rect class="warning" x="700" y="770" width="910" height="120"/>
  <text class="h2" x="720" y="804" fill="#7f1d1d">Runtime Constraints</text>
  <text class="txt" x="720" y="830" fill="#7f1d1d">1) 唯一启停闸门在 FSM</text>
  <text class="txt" x="960" y="830" fill="#7f1d1d">2) Data Plane 不走 EventBus（音频 DMA 独立）</text>
  <text class="txt" x="1320" y="830" fill="#7f1d1d">3) 断连可触发安全停机</text>

  <path class="ctrl" d="M400 450 C 455 450, 470 215, 520 215"/>
  <path class="ctrl" d="M770 215 C 790 215, 800 215, 820 215"/>
  <path class="ctrl" d="M1070 215 C 1095 215, 1100 215, 1120 215"/>

  <path class="ctrl" d="M1235 270 C 1235 300, 980 300, 980 320"/>

  <path class="safe" d="M1350 630 C 1330 630, 1310 630, 1260 470"/>
  <path class="safe" d="M1260 470 C 1200 470, 1150 470, 1060 470"/>
  <path class="safe" d="M1060 470 C 980 470, 920 470, 900 520"/>

  <path class="safe dashed" d="M400 470 C 510 470, 590 360, 700 360"/>
  <text class="small" x="430" y="500">Disconnect -&gt; onUserOff()</text>

  <path class="evt" d="M1410 470 C 1410 360, 1495 360, 1495 270"/>
  <path class="evt" d="M1410 520 C 1410 500, 1410 490, 1410 470"/>
  <path class="evt" d="M1495 160 C 1495 130, 645 130, 645 160"/>

  <path class="data" d="M400 700 C 520 700, 580 640, 700 640"/>
  <path class="data" d="M1040 640 C 1120 640, 1180 640, 1260 640"/>
  <text class="small" x="860" y="666">Data Plane: Wave audio buffer -&gt; I2S DMA (no EventBus)</text>

  <rect class="legend" x="40" y="920" width="640" height="45"/>
  <line class="ctrl" x1="60" y1="943" x2="130" y2="943"/><text class="small" x="140" y="948">Control</text>
  <line class="evt" x1="220" y1="943" x2="290" y2="943"/><text class="small" x="300" y="948">EventBus</text>
  <line class="data" x1="390" y1="943" x2="460" y2="943"/><text class="small" x="470" y="948">Data Plane</text>
  <line class="safe" x1="560" y1="943" x2="630" y2="943"/><text class="small" x="640" y="948">Safety Flow</text>
</svg>
